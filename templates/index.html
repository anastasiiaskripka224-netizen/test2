<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>
<title>Google Search</title>

<style>
html,
body{
    margin:0;
    min-height:100vh;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:20px;
    font-family:Arial, sans-serif;
    padding:30px;
}

form{
    display:flex;
    gap:10px;
}

input{
    padding:10px;
    width:260px;
}

button,
.back-btn,
.download-btn{
    padding:10px 16px;
    border:none;
    border-radius:6px;
    background:#ddd;
    color:black;
    text-decoration:none;
    cursor:pointer;
    font-size:14px;
}

.results{
    max-width:700px;
    width:100%;
}

.actions{
    display:flex;
    gap:12px;
}

a{
    word-break:break-word;
}
</style>

</head>

<body>

<form method="POST">
    <input
        name="keyword"
        placeholder="Enter keyword phrase"
        required
    >

    <button type="submit">
        Search
    </button>
</form>

{% if results %}

<div class="actions">
    <a href="/" class="back-btn">
        ← New Search
    </a>

    <a href="/download" class="download-btn">
        Download JSON
    </a>
</div>

<div class="results">

{% for result in results %}

<h3>
    {{ result.position }}.
    {{ result.title }}
</h3>

<a href="{{ result.url }}" target="_blank">
    {{ result.url }}
</a>

<p>
    {{ result.snippet }}
</p>

<hr>

{% endfor %}

</div>

{% endif %}

</body>
</html>
